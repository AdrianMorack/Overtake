version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: overtake
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-overtake_dev}
      POSTGRES_DB: overtake
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overtake"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://overtake:${POSTGRES_PASSWORD:-overtake_dev}@postgres:5432/overtake
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_in_production}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      OPENF1_BASE_URL: https://api.openf1.org/v1
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000/api

volumes:
  pgdata:
