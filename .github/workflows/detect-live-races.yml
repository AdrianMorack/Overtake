name: Detect Live Race Sessions

on:
  schedule:
    # Run every 30 minutes on Fridays, Saturdays, and Sundays (race weekends)
    # Qualifying often happens Friday/Saturday, races on Sunday
    - cron: '*/30 * * * 5,6,0'
  workflow_dispatch: # Manual trigger

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Get fresh access token
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.SERVER_URL }}/api/auth/refresh" \
            -H "Content-Type: application/json" \
            -d '{"refreshToken":"${{ secrets.BOT_REFRESH_TOKEN }}"}')
          
          ACCESS_TOKEN=$(echo $RESPONSE | jq -r '.accessToken')
          
          if [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to refresh token"
            exit 1
          fi
          
          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
      
      - name: Trigger live session detection
        run: |
          curl -X POST "${{ secrets.SERVER_URL }}/api/live/detect" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -f -v || echo "No live sessions detected (this is normal)"
