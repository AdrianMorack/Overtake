name: Sync F1 Data

on:
  schedule:
    # Run every Monday at 9 AM UTC (after race weekends)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Manual trigger button in GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync season data and results
        run: |
          curl -X POST "${{ secrets.SERVER_URL }}/api/races/admin/sync?year=2026" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -f || exit 1
