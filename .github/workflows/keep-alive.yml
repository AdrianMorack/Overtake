name: Keep Server Awake (Race Weekends)

on:
  schedule:
    # Ping every 10 minutes on Fridays, Saturdays, and Sundays
    # Prevents Render free tier from sleeping during race sessions
    - cron: '*/10 * * * 5,6,0'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging server health endpoint..."
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" "${{ secrets.SERVER_URL }}/api/health")
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Health check status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Server is awake"
          else
            echo "⚠️ Server returned $HTTP_CODE"
          fi
