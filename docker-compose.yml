
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: overtake
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: overtake
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overtake"]
      interval: 5s
      timeout: 3s
      retries: 5

  fastf1:
    build:
      context: ./fastf1-service
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ff1cache:/tmp/fastf1_cache
    ports:
      - "8100:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      fastf1:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://overtake:${POSTGRES_PASSWORD}@postgres:5432/overtake
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      FASTF1_BASE_URL: http://fastf1:8000
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000/api

volumes:
  pgdata:
  ff1cache:
