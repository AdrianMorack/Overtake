name: Keep Server Awake (Race Weekends)

on:
  schedule:
    # Ping every 10 minutes on Fridays, Saturdays, and Sundays
    # Prevents Render free tier from sleeping during race sessions
    - cron: '*/10 * * * 5,6,0'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -s "${{ secrets.SERVER_URL }}/api/health" || echo "Server warming up..."
