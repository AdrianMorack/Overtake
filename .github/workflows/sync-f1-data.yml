name: Sync F1 Data

on:
  schedule:
    # Run every Monday at 9 AM UTC (after race weekends)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Manual trigger button in GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get fresh access token
        id: auth
        run: |
          echo "Calling refresh endpoint..."
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST "${{ secrets.SERVER_URL }}/api/auth/refresh" \
            -H "Content-Type: application/json" \
            -d '{"refreshToken":"${{ secrets.BOT_REFRESH_TOKEN }}"}')
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          
          ACCESS_TOKEN=$(echo "$BODY" | jq -r '.accessToken // empty')
          
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to extract access token from response"
            echo "Response: $BODY"
            exit 1
          fi
          
          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
      
      - name: Sync F1 season data and results
        run: |
          YEAR=$(date +%Y)
          echo "Syncing F1 data for year $YEAR..."
          curl -X POST "${{ secrets.SERVER_URL }}/api/races/admin/sync?year=$YEAR" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -f -v || exit 1
